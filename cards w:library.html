<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Vocab Pro</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        
        /* Progress Bar */
        .progress-container { width: 100%; max-width: 400px; background: #ddd; height: 10px; border-radius: 5px; margin-bottom: 20px; }
        #progress-fill { width: 0%; height: 100%; background: var(--success); border-radius: 5px; transition: 0.3s; }

        /* Card Styling */
        .card-container { width: 90vw; max-width: 400px; height: 280px; perspective: 1000px; margin-bottom: 20px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; border-radius: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); border: 2px solid white; box-sizing: border-box;
        }
        .card-front { background: white; color: var(--primary); font-size: 32px; font-weight: bold; }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); font-size: 22px; line-height: 1.4; }

        /* Controls */
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 24px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:active { transform: scale(0.95); }
        .btn-next { background: var(--primary); color: white; }
        .btn-shuffle { background: #6c757d; color: white; }
        
        #counter { margin-top: 10px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

    <h2 id="status">Loading Vocabulary...</h2>

    <div class="progress-container">
        <div id="progress-fill"></div>
    </div>

    <div class="card-container" onclick="flipCard()">
        <div class="card-inner" id="flashcard">
            <div class="card-front" id="word-display">...</div>
            <div class="card-back" id="definition-display">...</div>
        </div>
    </div>

    <div id="counter">Word 0 of 0</div>

    <div class="btn-group">
        <button class="btn-shuffle" onclick="shuffleCards()">Shuffle 🔀</button>
        <button class="btn-next" onclick="nextWord()">Next Word →</button>
    </div>

    <script>
        // YOUR GOOGLE SHEET LINK
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?output=csv";

        let vocab = [];
        let index = 0;

        async function init() {
            try {
                const response = await fetch(sheetURL);
                const text = await response.text();
                const rows = text.split(/\r?\n/);
                
                vocab = rows.map(row => {
                    const cols = row.split(",");
                    return { term: cols[0]?.trim(), def: cols[1]?.trim() };
                }).filter(item => item.term && item.def && item.term.toLowerCase() !== "term");

                if (vocab.length > 0) {
                    document.getElementById('status').innerText = "Flashcards Ready!";
                    updateUI();
                }
            } catch (err) {
                document.getElementById('status').innerText = "⚠️ Error loading sheet";
            }
        }

        function updateUI() {
            const card = document.getElementById('flashcard');
            card.classList.remove('is-flipped');
            
            setTimeout(() => {
                document.getElementById('word-display').innerText = vocab[index].term;
                document.getElementById('definition-display').innerText = vocab[index].def;
                
                // Update Counter
                document.getElementById('counter').innerText = `Word ${index + 1} of ${vocab.length}`;
                
                // Update Progress Bar
                const percent = ((index + 1) / vocab.length) * 100;
                document.getElementById('progress-fill').style.width = percent + "%";
            }, 200);
        }

        function nextWord() {
            index = (index + 1) % vocab.length;
            updateUI();
        }

        function shuffleCards() {
            vocab.sort(() => Math.random() - 0.5);
            index = 0;
            updateUI();
            alert("Cards Shuffled!");
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('is-flipped');
        }

        init();
    </script>
</body>
</html>
