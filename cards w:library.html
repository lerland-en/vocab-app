<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Vocab App</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f7f9; padding: 20px; }
        .card-container { width: 350px; height: 250px; perspective: 1000px; margin: 20px 0; cursor: pointer; }
        .card-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.6s; transform-style: preserve-3d;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-radius: 15px;
        }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            font-size: 28px; font-weight: bold; border-radius: 15px; box-sizing: border-box; border: 3px solid #007bff;
        }
        .card-front { background-color: white; color: #333; }
        .card-back { background-color: #007bff; color: white; transform: rotateY(180deg); }
        button { padding: 12px 24px; margin: 5px; cursor: pointer; border: none; border-radius: 8px; background: #28a745; color: white; font-weight: bold; }
        #debug-log { margin-top: 20px; padding: 10px; background: #eee; border-radius: 5px; font-size: 12px; max-width: 400px; color: #555; }
    </style>
</head>
<body>

    <h1>Vocabulary App</h1>
    <div id="status">Status: ⏳ Connecting...</div>

    <div class="card-container" onclick="flipCard()">
        <div class="card-inner" id="flashcard">
            <div class="card-front" id="word-display">...</div>
            <div class="card-back" id="definition-display">...</div>
        </div>
    </div>

    <div>
        <button onclick="nextWord()">Next Word →</button>
        <button onclick="useSampleData()" style="background: #6c757d;">Use Sample Data (Fallback)</button>
    </div>

    <div id="debug-log">Debug Log: Starting...</div>

    <script>
        // YOUR VALID LINK
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?output=csv";

        let vocab = [];
        let index = 0;

        const log = (msg) => {
            console.log(msg);
            document.getElementById('debug-log').innerText += "\n> " + msg;
        };

        async function init() {
            try {
                log("Fetching from Google Sheets...");
                const response = await fetch(sheetURL);
                
                if (!response.ok) throw new Error("Could not reach Google Sheets.");
                
                const text = await response.text();
                log("Data received! Parsing now...");
                
                const rows = text.split(/\r?\n/); // Handles both Windows and Mac line breaks
                
                vocab = rows.map(row => {
                    const cols = row.split(",");
                    return { term: cols[0]?.trim(), def: cols[1]?.trim() };
                }).filter(item => item.term && item.def && item.term.toLowerCase() !== "term");

                if (vocab.length > 0) {
                    document.getElementById('status').innerText = "Status: ✅ " + vocab.length + " words loaded!";
                    showWord();
                } else {
                    throw new Error("Sheet was empty or formatted incorrectly.");
                }
            } catch (err) {
                log("Error: " + err.message);
                document.getElementById('status').innerText = "Status: ❌ Error. Check Debug Log below.";
            }
        }

        function showWord() {
            const card = document.getElementById('flashcard');
            card.classList.remove('is-flipped');
            setTimeout(() => {
                document.getElementById('word-display').innerText = vocab[index].term;
                document.getElementById('definition-display').innerText = vocab[index].def;
            }, 200);
        }

        function nextWord() {
            if (vocab.length === 0) return;
            index = (index + 1) % vocab.length;
            showWord();
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('is-flipped');
        }

        function useSampleData() {
            log("Switching to sample data...");
            vocab = [
                { term: "Persistence", def: "Never giving up." },
                { term: "Coding", def: "Giving instructions to a computer." }
            ];
            document.getElementById('status').innerText = "Status: 🛠 Using Sample Data";
            showWord();
        }

        init();
    </script>
</body>
</html>
