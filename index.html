<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Vocab Master</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f8f9fa; --dark: #343a40; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* Lesson Selector Area */
        .setup-area { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 90%; max-width: 400px; margin-bottom: 15px; text-align: center; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 2px solid var(--primary); font-size: 16px; margin-top: 5px; cursor: pointer; }

        /* Mode Switcher */
        .nav { margin-bottom: 15px; display: flex; gap: 8px; }
        .nav button { background: #dee2e6; color: var(--dark); border-radius: 20px; padding: 8px 18px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .nav button.active { background: var(--primary); color: white; }

        .hidden { display: none !important; }
        
        /* Flashcard Area */
        .card-container { width: 90vw; max-width: 400px; height: 260px; perspective: 1000px; cursor: pointer; margin-bottom: 15px; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            padding: 25px; border-radius: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.1); box-sizing: border-box; border: 2px solid #fff;
        }
        .card-front { background: white; color: var(--primary); font-size: 26px; font-weight: bold; }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); font-size: 18px; text-align: center; }

        /* Action Buttons */
        .controls { display: flex; gap: 10px; justify-content: center; width: 100%; max-width: 400px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; font-size: 14px; }
        .btn-next { background: var(--primary); }
        .btn-shuffle { background: #6c757d; }

        /* Matching Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-width: 500px; width: 100%; }
        .tile { padding: 12px; background: white; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; text-align: center; font-size: 13px; min-height: 65px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .tile.selected { border-color: var(--primary); background: #e7f1ff; }
        .tile.matched { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="setup-area">
        <label for="lesson-select"><strong>Current Lesson:</strong></label>
        <select id="lesson-select" onchange="changeLesson(this.value)">
            <option>Loading...</option>
        </select>
    </div>

    <div class="nav">
        <button id="btn-flash" class="active" onclick="showMode('flash')">Flashcards</button>
        <button id="btn-match" onclick="showMode('match')">Matching</button>
    </div>

    <div id="flash-mode">
        <div class="card-container" onclick="flipCard()">
            <div class="card-inner" id="flashcard">
                <div class="card-front" id="word-display">Loading...</div>
                <div class="card-back" id="definition-display">...</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn btn-shuffle" onclick="shuffleCurrentLesson()">Shuffle 🔀</button>
            <button class="btn btn-next" onclick="nextWord()">Next Word →</button>
        </div>
    </div>

    <div id="match-mode" class="hidden">
        <div class="grid" id="game-grid"></div>
        <div class="controls" style="margin-top: 15px;">
            <button class="btn btn-shuffle" onclick="setupMatchingGame()">New Match Game 🔄</button>
        </div>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?output=csv";
        
        let allData = {}; 
        let currentLessonName = "";
        let currentIndex = 0;
        let selectedTile = null;

        async function init() {
            try {
                const res = await fetch(sheetURL);
                const text = await res.text();
                const rows = text.split(/\r?\n/);
                
                allData = {}; 

                rows.forEach((row, i) => {
                    if (i === 0) return; 
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 2) {
                        const term = cols[0].replace(/"/g, "").trim();
                        const def = cols[1].replace(/"/g, "").trim();
                        const category = (cols[2] && cols[2].trim() !== "") ? cols[2].replace(/"/g, "").trim() : "General Vocabulary";

                        if (!allData[category]) allData[category] = [];
                        allData[category].push({ term, def });
                    }
                });

                populateDropdown();
            } catch (e) {
                console.error("Fetch Error:", e);
                document.getElementById('word-display').innerText = "Error loading CSV link.";
            }
        }

        function populateDropdown() {
            const select = document.getElementById('lesson-select');
            select.innerHTML = "";
            const lessons = Object.keys(allData);
            
            lessons.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.innerText = name;
                select.appendChild(opt);
            });

            if (lessons.length > 0) changeLesson(lessons[0]);
        }

        function changeLesson(name) {
            currentLessonName = name;
            currentIndex = 0;
            updateFlashcard();
            if (!document.getElementById('match-mode').classList.contains('hidden')) {
                setupMatchingGame();
            }
        }

        function showMode(mode) {
            document.getElementById('flash-mode').classList.toggle('hidden', mode !== 'flash');
            document.getElementById('match-mode').classList.toggle('hidden', mode !== 'match');
            document.getElementById('btn-flash').classList.toggle('active', mode === 'flash');
            document.getElementById('btn-match').classList.toggle('active', mode === 'match');
            if (mode === 'match') setupMatchingGame();
        }

        function flipCard() { document.getElementById('flashcard').classList.toggle('is-flipped'); }
        
        function nextWord() {
            const lessonWords = allData[currentLessonName];
            currentIndex = (currentIndex + 1) % lessonWords.length;
            updateFlashcard();
        }

        function shuffleCurrentLesson() {
            if (!allData[currentLessonName]) return;
            // The Shuffle Logic
            allData[currentLessonName].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            updateFlashcard();
        }

        function updateFlashcard() {
            document.getElementById('flashcard').classList.remove('is-flipped');
            setTimeout(() => {
                const item = allData[currentLessonName][currentIndex];
                document.getElementById('word-display').innerText = item.term;
                document.getElementById('definition-display').innerText = item.def;
            }, 200);
        }

        function setupMatchingGame() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            selectedTile = null;
            
            let lessonWords = allData[currentLessonName];
            if (!lessonWords) return;

            let pool = [...lessonWords].sort(() => 0.5 - Math.random()).slice(0, 4);
            
            let tiles = [];
            pool.forEach((item, i) => {
                tiles.push({ text: item.term, id: i, type: 't' });
                tiles.push({ text: item.def, id: i, type: 'd' });
            });
            tiles.sort(() => 0.5 - Math.random());

            tiles.forEach(data => {
                const div = document.createElement('div');
                div.className = 'tile';
                div.innerText = data.text;
                div.onclick = () => {
                    if (div.classList.contains('matched')) return;
                    if (!selectedTile) {
                        selectedTile = { div, data };
                        div.classList.add('selected');
                    } else {
                        if (selectedTile.div === div) {
                            div.classList.remove('selected');
                            selectedTile = null;
                            return;
                        }
                        if (selectedTile.data.id === data.id && selectedTile.data.type !== data.type) {
                            div.classList.add('matched');
                            selectedTile.div.classList.add('matched');
                        } else {
                            selectedTile.div.classList.remove('selected');
                        }
                        selectedTile = null;
                    }
                };
                grid.appendChild(div);
            });
        }

        init();
    </script>
</body>
</html>
