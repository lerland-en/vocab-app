<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Vocab Pro</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f8f9fa; --error: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Navigation */
        .nav { margin-bottom: 20px; display: flex; gap: 10px; }
        .nav button { background: #ddd; color: #333; box-shadow: none; }
        .nav button.active { background: var(--primary); color: white; }

        /* General Styles */
        .hidden { display: none !important; }
        .card-container { width: 90vw; max-width: 400px; height: 280px; perspective: 1000px; margin-bottom: 20px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            padding: 30px; border-radius: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); box-sizing: border-box;
        }
        .card-front { background: white; color: var(--primary); font-size: 28px; font-weight: bold; border: 2px solid var(--primary); }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); font-size: 20px; }

        /* Matching Game Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; width: 100%; }
        .tile {
            padding: 15px; background: white; border: 2px solid #ddd; border-radius: 10px;
            cursor: pointer; text-align: center; font-size: 14px; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; min-height: 60px;
        }
        .tile.selected { border-color: var(--primary); background: #e7f1ff; }
        .tile.matched { visibility: hidden; pointer-events: none; }

        button { padding: 12px 24px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.2s; background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div class="nav">
        <button id="btn-flash" class="active" onclick="showMode('flash')">Flashcards</button>
        <button id="btn-match" onclick="showMode('match')">Matching Game</button>
    </div>

    <div id="flash-mode">
        <div class="card-container" onclick="flipCard()">
            <div class="card-inner" id="flashcard">
                <div class="card-front" id="word-display">Loading...</div>
                <div class="card-back" id="definition-display">...</div>
            </div>
        </div>
        <button onclick="nextWord()">Next Word →</button>
    </div>

    <div id="match-mode" class="hidden">
        <h3>Match the pairs!</h3>
        <div class="grid" id="game-grid"></div>
        <button onclick="setupMatchingGame()" style="margin-top:20px; background:#6c757d;">Reset Game</button>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?output=csv";
        let vocab = [];
        let index = 0;
        let selectedTile = null;

        async function init() {
            try {
                const res = await fetch(sheetURL);
                const text = await res.text();
                const rows = text.split(/\r?\n/);
                vocab = rows.map(r => {
                    const c = r.split(",");
                    return { term: c[0]?.trim(), def: c[1]?.trim() };
                }).filter(i => i.term && i.def && i.term.toLowerCase() !== "term");
                
                updateFlashcard();
            } catch (e) { console.error(e); }
        }

        // MODE SWITCHING
        function showMode(mode) {
            document.getElementById('flash-mode').classList.toggle('hidden', mode !== 'flash');
            document.getElementById('match-mode').classList.toggle('hidden', mode !== 'match');
            document.getElementById('btn-flash').classList.toggle('active', mode === 'flash');
            document.getElementById('btn-match').classList.toggle('active', mode === 'match');
            if (mode === 'match') setupMatchingGame();
        }

        // FLASHCARD LOGIC
        function flipCard() { document.getElementById('flashcard').classList.toggle('is-flipped'); }
        function nextWord() {
            index = (index + 1) % vocab.length;
            updateFlashcard();
        }
        function updateFlashcard() {
            document.getElementById('flashcard').classList.remove('is-flipped');
            setTimeout(() => {
                document.getElementById('word-display').innerText = vocab[index].term;
                document.getElementById('definition-display').innerText = vocab[index].def;
            }, 200);
        }

        // MATCHING GAME LOGIC
        function setupMatchingGame() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            selectedTile = null;

            // Take 4 random words
            let pool = [...vocab].sort(() => 0.5 - Math.random()).slice(0, 4);
            let tiles = [];

            pool.forEach((item, i) => {
                tiles.push({ text: item.term, pairId: i, type: 'term' });
                tiles.push({ text: item.def, pairId: i, type: 'def' });
            });

            tiles.sort(() => 0.5 - Math.random());

            tiles.forEach(tileData => {
                const div = document.createElement('div');
                div.className = 'tile';
                div.innerText = tileData.text;
                div.onclick = () => handleTileClick(div, tileData);
                grid.appendChild(div);
            });
        }

        function handleTileClick(div, data) {
            if (div.classList.contains('matched')) return;

            if (!selectedTile) {
                selectedTile = { div, data };
                div.classList.add('selected');
            } else {
                if (selectedTile.div === div) {
                    div.classList.remove('selected');
                    selectedTile = null;
                    return;
                }

                if (selectedTile.data.pairId === data.pairId && selectedTile.data.type !== data.type) {
                    // It's a match!
                    div.classList.add('matched');
                    selectedTile.div.classList.add('matched');
                } else {
                    // Not a match
                    selectedTile.div.classList.remove('selected');
                }
                selectedTile = null;
            }
        }

        init();
    </script>
</body>
</html>
