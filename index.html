<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Master Pro</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f8f9fa; --dark: #343a40; --secondary: #6c757d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* LOGIN OVERLAY */
        #login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white;
        }
        .login-box { background: white; padding: 30px; border-radius: 15px; color: var(--dark); width: 80%; max-width: 300px; text-align: center; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }

        /* HEADER & STATS */
        .setup-area { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 90%; max-width: 400px; margin-bottom: 15px; text-align: center; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 2px solid var(--primary); font-size: 16px; margin-top: 5px; cursor: pointer; }
        .stats-text { font-size: 13px; color: #666; margin-top: 10px; font-weight: bold; }

        .nav { margin-bottom: 15px; display: flex; gap: 8px; }
        .nav button { background: #dee2e6; color: var(--dark); border-radius: 20px; padding: 8px 18px; cursor: pointer; border: none; font-weight: bold; }
        .nav button.active { background: var(--primary); color: white; }

        .hidden { display: none !important; }
        
        /* FLASHCARD */
        .card-container { width: 90vw; max-width: 400px; height: 260px; perspective: 1000px; cursor: pointer; margin-bottom: 15px; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 25px; border-radius: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.1); border: 2px solid #fff; box-sizing: border-box;
        }
        .card-front { background: white; color: var(--primary); font-size: 26px; font-weight: bold; }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); font-size: 18px; text-align: center; }
        
        .speaker-btn { background: #eee; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; margin-top: 15px; font-size: 20px; }

        /* BUTTONS */
        .controls { display: flex; gap: 8px; justify-content: center; width: 100%; max-width: 420px; }
        .btn { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; font-size: 13px; }
        .btn-next { background: var(--primary); }
        .btn-master { background: var(--success); }
        .btn-shuffle { background: var(--secondary); }
        .btn-reset { background: transparent; color: #999; font-size: 11px; margin-top: 10px; text-decoration: underline; cursor: pointer; border:none; }

        /* MATCHING GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-width: 500px; width: 100%; }
        .tile { padding: 12px; background: white; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; text-align: center; font-size: 13px; min-height: 70px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .tile.selected { border-color: var(--primary); background: #e7f1ff; }
        .tile.matched { opacity: 0; pointer-events: none; }

        #success-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(40,167,69,0.95);
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align:center;
        }
    </style>
</head>
<body>

   <div id="login-overlay">
    <div class="login-box">
        <h2>Student Login</h2>
        <input type="text" id="login-id" placeholder="Enter Name" onkeydown="if(event.key === 'Enter') handleLogin()">
        <button class="btn btn-next" style="width:100%" onclick="handleLogin()">Start Learning</button>
        <p id="login-error" style="color:red; font-size:12px; margin-top:10px;" class="hidden">Name not in database.</p>
    </div>
</div>

    <div id="success-overlay" class="hidden">
        <h1>🎉 Excellent!</h1>
        <p>You matched all current words!</p>
        <button class="btn" style="background: white; color: var(--success); width: 180px;" onclick="closeSuccess()">Play Again</button>
    </div>

    <div class="setup-area">
        <h3 id="display-name" style="margin:0">Welcome</h3>
        <select id="lesson-select" onchange="changeLesson(this.value)"></select>
        <div id="progress-stats" class="stats-text">Words left: 0</div>
        <button class="btn-reset" onclick="resetMastery()">Reset Mastered Words 🔄</button>
    </div>

    <div class="nav">
        <button id="btn-flash" class="active" onclick="showMode('flash')">Flashcards</button>
        <button id="btn-match" onclick="showMode('match')">Matching</button>
    </div>

    <div id="flash-mode">
        <div class="card-container" onclick="flipCard()">
            <div class="card-inner" id="flashcard">
                <div class="card-front">
                    <span id="word-display">Word</span>
                    <button class="speaker-btn" onclick="speakWord(event)">🔊</button>
                </div>
                <div class="card-back" id="definition-display">Definition</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn btn-master" onclick="markAsMastered()">Mastered ✅</button>
            <button class="btn btn-shuffle" onclick="shuffleCurrentLesson()">Shuffle 🔀</button>
            <button class="btn btn-next" onclick="nextWord()">Next →</button>
        </div>
    </div>

    <div id="match-mode" class="hidden">
        <div class="grid" id="game-grid"></div>
        <button class="btn btn-shuffle" style="margin-top:15px; width:100%; max-width:400px;" onclick="setupMatchingGame()">New Game 🔄</button>
    </div>

    <script>
        // --- 1. STUDENT DATABASE ---
        // !!! PASTE YOUR RECENT STUDENT LIST AND LINKS HERE !!!
        const studentDatabase = {
            "john": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?output=csv",
            "vlada": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?gid=997411355&single=true&output=csv",
            "karina": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?gid=988272349&single=true&output=csv",
            "gorgeous": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?gid=332854845&single=true&output=csv",
            "trash": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?gid=1434284059&single=true&output=csv",
            "alina": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?gid=805298318&single=true&output=csv",
             "lala": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?gid=1069373262&single=true&output=csv",
             "group10": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?gid=1630257368&single=true&output=csv",
             "denis": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?gid=1489062981&single=true&output=csv",
        };

        let rawData = {}; 
        let currentLessonName = "";
        let currentIndex = 0;
        let activeStudent = "";
        let masteredList = [];
        let selectedTile = null;

        // --- 2. LOGIN & STORAGE ---
        function handleLogin() {
            const id = document.getElementById('login-id').value.toLowerCase().trim();
            if (studentDatabase[id]) {
                activeStudent = id;
                document.getElementById('login-overlay').classList.add('hidden');
                const saved = localStorage.getItem('mastered_' + activeStudent);
                masteredList = saved ? JSON.parse(saved) : [];
                init();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        async function init() {
            const sheetURL = studentDatabase[activeStudent];
            document.getElementById('display-name').innerText = "Hello, " + activeStudent.charAt(0).toUpperCase() + activeStudent.slice(1);
            
            try {
                const res = await fetch(sheetURL);
                const text = await res.text();
                const rows = text.split(/\r?\n/);
                rawData = {};
                rows.forEach((row, i) => {
                    if (i === 0 || row.trim() === "") return;
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 2) {
                        const term = cols[0].replace(/"/g, "").trim();
                        const def = cols[1].replace(/"/g, "").trim();
                        const cat = (cols[2] && cols[2].trim() !== "") ? cols[2].replace(/"/g, "").trim() : "General";
                        if (!rawData[cat]) rawData[cat] = [];
                        rawData[cat].push({ term, def });
                    }
                });
                populateDropdown();
            } catch (e) { alert("Error loading data from Google."); }
        }

        // --- 3. FILTERING & SHUFFLE ---
        function getWordsToStudy() {
            if (!rawData[currentLessonName]) return [];
            return rawData[currentLessonName].filter(item => !masteredList.includes(item.term));
        }

        function shuffleCurrentLesson() {
            if (!rawData[currentLessonName]) return;
            // Shuffling the source for this session
            rawData[currentLessonName].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            updateFlashcard();
        }

        function markAsMastered() {
            const words = getWordsToStudy();
            if (words.length === 0) return;
            const word = words[currentIndex % words.length].term;
            masteredList.push(word);
            localStorage.setItem('mastered_' + activeStudent, JSON.stringify(masteredList));
            updateStats();
            nextWord();
        }

        function resetMastery() {
            if (confirm("Reset all progress for " + activeStudent + "?")) {
                masteredList = [];
                localStorage.removeItem('mastered_' + activeStudent);
                updateStats();
                updateFlashcard();
            }
        }

        function updateStats() {
            const left = getWordsToStudy().length;
            document.getElementById('progress-stats').innerText = `Words left in this lesson: ${left}`;
        }

        // --- 4. NAVIGATION ---
        function populateDropdown() {
            const select = document.getElementById('lesson-select');
            select.innerHTML = "";
            const keys = Object.keys(rawData);
            keys.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.innerText = name;
                select.appendChild(opt);
            });
            if (keys.length > 0) changeLesson(keys[0]);
        }

        function changeLesson(name) {
            currentLessonName = name;
            currentIndex = 0;
            updateStats();
            updateFlashcard();
            if (!document.getElementById('match-mode').classList.contains('hidden')) setupMatchingGame();
        }

        function updateFlashcard() {
            const words = getWordsToStudy();
            document.getElementById('flashcard').classList.remove('is-flipped');
            setTimeout(() => {
                if (words.length > 0) {
                    const item = words[currentIndex % words.length];
                    document.getElementById('word-display').innerText = item.term;
                    document.getElementById('definition-display').innerText = item.def;
                } else {
                    document.getElementById('word-display').innerText = "All Mastered! 🏆";
                    document.getElementById('definition-display').innerText = "Try another lesson or reset.";
                }
            }, 200);
        }

        function nextWord() {
            const words = getWordsToStudy();
            if (words.length > 0) currentIndex = (currentIndex + 1) % words.length;
            updateFlashcard();
        }

        // --- 5. AUDIO & MODES ---
        function speakWord(event) {
            event.stopPropagation();
            const word = document.getElementById('word-display').innerText;
            const ut = new SpeechSynthesisUtterance(word);
            ut.lang = 'en-US';
            window.speechSynthesis.speak(ut);
        }

        function showMode(mode) {
            document.getElementById('flash-mode').classList.toggle('hidden', mode !== 'flash');
            document.getElementById('match-mode').classList.toggle('hidden', mode !== 'match');
            document.getElementById('btn-flash').classList.toggle('active', mode === 'flash');
            document.getElementById('btn-match').classList.toggle('active', mode === 'match');
            if (mode === 'match') setupMatchingGame();
        }

        function flipCard() { document.getElementById('flashcard').classList.toggle('is-flipped'); }

        // --- 6. MATCHING LOGIC ---
        function setupMatchingGame() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            selectedTile = null;
            const words = getWordsToStudy();
            const targetCount = Math.min(words.length, 6);
            if (targetCount === 0) {
                grid.innerHTML = "<p style='grid-column: 1/3'>No words left to match!</p>";
                return;
            }
            let pool = [...words].sort(() => 0.5 - Math.random()).slice(0, targetCount);
            let tiles = [];
            pool.forEach((item, i) => {
                tiles.push({ text: item.term, id: i, type: 't' });
                tiles.push({ text: item.def, id: i, type: 'd' });
            });
            tiles.sort(() => 0.5 - Math.random());
            let matchedInSession = 0;
            tiles.forEach(data => {
                const div = document.createElement('div');
                div.className = 'tile';
                div.innerText = data.text;
                div.onclick = () => {
                    if (div.classList.contains('matched')) return;
                    if (!selectedTile) {
                        selectedTile = { div, data };
                        div.classList.add('selected');
                    } else {
                        if (selectedTile.div === div) {
                            div.classList.remove('selected');
                            selectedTile = null;
                            return;
                        }
                        if (selectedTile.data.id === data.id && selectedTile.data.type !== data.type) {
                            div.classList.add('matched');
                            selectedTile.div.classList.add('matched');
                            matchedInSession++;
                            if (matchedInSession === targetCount) {
                                setTimeout(() => { document.getElementById('success-overlay').classList.remove('hidden'); }, 500);
                            }
                        } else { selectedTile.div.classList.remove('selected'); }
                        selectedTile = null;
                    }
                };
                grid.appendChild(div);
            });
        }

        function closeSuccess() {
            document.getElementById('success-overlay').classList.add('hidden');
            setupMatchingGame();
        }

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const user = params.get('user');
            if (user && studentDatabase[user.toLowerCase()]) {
                document.getElementById('login-id').value = user;
                handleLogin();
            }
        };
    </script>
</body>
</html>
