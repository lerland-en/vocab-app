<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Master Pro</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f8f9fa; --dark: #343a40; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* LOGIN OVERLAY */
        #login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white;
        }
        .login-box { background: white; padding: 30px; border-radius: 15px; color: var(--dark); width: 80%; max-width: 300px; text-align: center; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }

        /* HEADER & SELECTOR */
        .setup-area { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 90%; max-width: 400px; margin-bottom: 15px; text-align: center; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 2px solid var(--primary); font-size: 16px; margin-top: 5px; }

        .nav { margin-bottom: 15px; display: flex; gap: 8px; }
        .nav button { background: #dee2e6; color: var(--dark); border-radius: 20px; padding: 8px 18px; cursor: pointer; border: none; font-weight: bold; }
        .nav button.active { background: var(--primary); color: white; }

        .hidden { display: none !important; }
        
        /* CARD & AUDIO */
        .card-container { width: 90vw; max-width: 400px; height: 260px; perspective: 1000px; cursor: pointer; margin-bottom: 15px; position: relative; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 25px; border-radius: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.1); border: 2px solid #fff; box-sizing: border-box;
        }
        .card-front { background: white; color: var(--primary); font-size: 26px; font-weight: bold; }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); font-size: 18px; }
        
        .speaker-btn { background: #eee; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; margin-top: 15px; font-size: 20px; transition: 0.2s; }
        .speaker-btn:hover { background: #ddd; }

        .btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; flex: 1; }
        .btn-next { background: var(--primary); }
        .btn-shuffle { background: #6c757d; }

        /* GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-width: 500px; width: 100%; }
        .tile { padding: 12px; background: white; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; text-align: center; font-size: 13px; min-height: 65px; display: flex; align-items: center; justify-content: center; }
        .tile.selected { border-color: var(--primary); background: #e7f1ff; }
        .tile.matched { opacity: 0; pointer-events: none; }

        #success-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(40,167,69,0.95);
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Student Login</h2>
            <input type="text" id="login-id" placeholder="Enter your Name (e.g. john)">
            <button class="btn btn-next" style="width:100%" onclick="handleLogin()">Start Learning</button>
            <p id="login-error" style="color:red; font-size:12px; margin-top:10px;" class="hidden">Student not found.</p>
        </div>
    </div>

    <div id="success-overlay" class="hidden">
        <h1>🎉 Excellent!</h1>
        <p>You matched everything correctly.</p>
        <button class="btn" style="background: white; color: var(--success); max-width: 200px;" onclick="closeSuccess()">Continue</button>
    </div>

    <div class="setup-area">
        <h3 id="display-name">Welcome</h3>
        <select id="lesson-select" onchange="changeLesson(this.value)"></select>
    </div>

    <div class="nav">
        <button id="btn-flash" class="active" onclick="showMode('flash')">Flashcards</button>
        <button id="btn-match" onclick="showMode('match')">Matching</button>
    </div>

    <div id="flash-mode">
        <div class="card-container" onclick="flipCard()">
            <div class="card-inner" id="flashcard">
                <div class="card-front">
                    <span id="word-display">Word</span>
                    <button class="speaker-btn" onclick="speakWord(event)">🔊</button>
                </div>
                <div class="card-back" id="definition-display">Definition</div>
            </div>
        </div>
        <div style="display:flex; gap:10px; width:100%; max-width:400px;">
            <button class="btn btn-shuffle" onclick="shuffleCurrentLesson()">Shuffle 🔀</button>
            <button class="btn btn-next" onclick="nextWord()">Next →</button>
        </div>
    </div>

    <div id="match-mode" class="hidden">
        <div class="grid" id="game-grid"></div>
        <button class="btn btn-shuffle" style="margin-top:15px; width:100%; max-width:400px;" onclick="setupMatchingGame()">Restart Game</button>
    </div>

    <script>
        const studentDatabase = {
            "john": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?output=csv",
            "test": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?output=csv",
            "Vlada": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS--AB3xRXgEY6Pw6_KCz43YUo2cbBZskowBoUNZ7ruPS9N2dAT-4fvDaJPYGllWWNjSSfMZ4VspCGU/pub?output=csv",
        };

        let allData = {}; 
        let currentLessonName = "";
        let currentIndex = 0;
        let selectedTile = null;
        let matchesFound = 0;
        let targetMatches = 0;

        // 1. LOGIN LOGIC
        function handleLogin() {
            const id = document.getElementById('login-id').value.toLowerCase().trim();
            if (studentDatabase[id]) {
                document.getElementById('login-overlay').classList.add('hidden');
                init(id);
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        async function init(studentId) {
            const sheetURL = studentDatabase[studentId];
            document.getElementById('display-name').innerText = "Hello, " + studentId.charAt(0).toUpperCase() + studentId.slice(1);
            
            try {
                const res = await fetch(sheetURL);
                const text = await res.text();
                const rows = text.split(/\r?\n/);
                allData = {};
                rows.forEach((row, i) => {
                    if (i === 0) return;
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 2) {
                        const term = cols[0].replace(/"/g, "").trim();
                        const def = cols[1].replace(/"/g, "").trim();
                        const cat = (cols[2] && cols[2].trim() !== "") ? cols[2].replace(/"/g, "").trim() : "General";
                        if (!allData[cat]) allData[cat] = [];
                        allData[cat].push({ term, def });
                    }
                });
                populateDropdown();
            } catch (e) { alert("Error loading student data."); }
        }

        // 2. AUDIO LOGIC
        function speakWord(event) {
            event.stopPropagation(); // Prevents the card from flipping when clicking the speaker
            const word = document.getElementById('word-display').innerText;
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US'; // You can change this to 'en-GB' or others
            utterance.rate = 0.9;     // Slightly slower for learning
            window.speechSynthesis.speak(utterance);
        }

        // --- CORE FUNCTIONS ---
        function populateDropdown() {
            const select = document.getElementById('lesson-select');
            select.innerHTML = "";
            Object.keys(allData).forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.innerText = name;
                select.appendChild(opt);
            });
            changeLesson(Object.keys(allData)[0]);
        }

        function changeLesson(name) {
            currentLessonName = name;
            currentIndex = 0;
            updateFlashcard();
            if (!document.getElementById('match-mode').classList.contains('hidden')) setupMatchingGame();
        }

        function showMode(mode) {
            document.getElementById('flash-mode').classList.toggle('hidden', mode !== 'flash');
            document.getElementById('match-mode').classList.toggle('hidden', mode !== 'match');
            document.getElementById('btn-flash').classList.toggle('active', mode === 'flash');
            document.getElementById('btn-match').classList.toggle('active', mode === 'match');
            if (mode === 'match') setupMatchingGame();
        }

        function flipCard() { document.getElementById('flashcard').classList.toggle('is-flipped'); }
        function nextWord() {
            currentIndex = (currentIndex + 1) % allData[currentLessonName].length;
            updateFlashcard();
        }
        function shuffleCurrentLesson() {
            allData[currentLessonName].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            updateFlashcard();
        }
        function updateFlashcard() {
            document.getElementById('flashcard').classList.remove('is-flipped');
            setTimeout(() => {
                const item = allData[currentLessonName][currentIndex];
                document.getElementById('word-display').innerText = item.term;
                document.getElementById('definition-display').innerText = item.def;
            }, 200);
        }

        function setupMatchingGame() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            selectedTile = null;
            matchesFound = 0;
            let lessonWords = allData[currentLessonName];
            targetMatches = Math.min(lessonWords.length, 6);
            let pool = [...lessonWords].sort(() => 0.5 - Math.random()).slice(0, targetMatches);
            let tiles = [];
            pool.forEach((item, i) => {
                tiles.push({ text: item.term, id: i, type: 't' });
                tiles.push({ text: item.def, id: i, type: 'd' });
            });
            tiles.sort(() => 0.5 - Math.random());
            tiles.forEach(data => {
                const div = document.createElement('div');
                div.className = 'tile';
                div.innerText = data.text;
                div.onclick = () => {
                    if (div.classList.contains('matched')) return;
                    if (!selectedTile) {
                        selectedTile = { div, data };
                        div.classList.add('selected');
                    } else {
                        if (selectedTile.data.id === data.id && selectedTile.data.type !== data.type) {
                            div.classList.add('matched');
                            selectedTile.div.classList.add('matched');
                            matchesFound++;
                            if (matchesFound === targetMatches) {
                                setTimeout(() => { document.getElementById('success-overlay').classList.remove('hidden'); }, 500);
                            }
                        } else { selectedTile.div.classList.remove('selected'); }
                        selectedTile = null;
                    }
                };
                grid.appendChild(div);
            });
        }

        function closeSuccess() {
            document.getElementById('success-overlay').classList.add('hidden');
            setupMatchingGame();
        }
    </script>
</body>
</html>
