<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Vocab Master</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f8f9fa; --dark: #343a40; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .setup-area { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 90%; max-width: 400px; margin-bottom: 15px; text-align: center; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 2px solid var(--primary); font-size: 16px; margin-top: 5px; cursor: pointer; }

        .nav { margin-bottom: 15px; display: flex; gap: 8px; }
        .nav button { background: #dee2e6; color: var(--dark); border-radius: 20px; padding: 8px 18px; cursor: pointer; border: none; font-weight: bold; }
        .nav button.active { background: var(--primary); color: white; }

        .hidden { display: none !important; }
        
        .card-container { width: 90vw; max-width: 400px; height: 260px; perspective: 1000px; cursor: pointer; margin-bottom: 15px; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            padding: 25px; border-radius: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.1); box-sizing: border-box; border: 2px solid #fff;
        }
        .card-front { background: white; color: var(--primary); font-size: 26px; font-weight: bold; }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); font-size: 18px; text-align: center; }

        .controls { display: flex; gap: 10px; justify-content: center; width: 100%; max-width: 400px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; }
        .btn-next { background: var(--primary); }
        .btn-shuffle { background: #6c757d; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-width: 500px; width: 100%; }
        .tile { padding: 12px; background: white; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; text-align: center; font-size: 13px; min-height: 65px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .tile.selected { border-color: var(--primary); background: #e7f1ff; }
        .tile.matched { opacity: 0; pointer-events: none; }

        #success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 167, 69, 0.9); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }
    </style>
</head>
<body>

    <div id="success-overlay" class="hidden">
        <h1>🎉 Excellent!</h1>
        <p>You matched all the words in this set.</p>
        <button class="btn" style="background: white; color: var(--success); width: 200px;" onclick="closeSuccess()">Play Again</button>
    </div>

    <div class="setup-area">
        <label for="lesson-select"><strong>Current Lesson:</strong></label>
        <select id="lesson-select" onchange="changeLesson(this.value)">
            <option>Loading...</option>
        </select>
    </div>

    <div class="nav">
        <button id="btn-flash" class="active" onclick="showMode('flash')">Flashcards</button>
        <button id="btn-match" onclick="showMode('match')">Matching</button>
    </div>

    <div id="flash-mode">
        <div class="card-container" onclick="flipCard()">
            <div class="card-inner" id="flashcard">
                <div class="card-front" id="word-display">Loading...</div>
                <div class="card-back" id="definition-display">...</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn btn-shuffle" onclick="shuffleCurrentLesson()">Shuffle 🔀</button>
            <button class="btn btn-next" onclick="nextWord()">Next Word →</button>
        </div>
    </div>

    <div id="match-mode" class="hidden">
        <div class="grid" id="game-grid"></div>
        <div class="controls" style="margin-top: 15px;">
            <button class="btn btn-shuffle" onclick="setupMatchingGame()">New Match Game 🔄</button>
        </div>
    </div>
